    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Cvent
  ServiceCategory: Developer Tools / API
  ProviderName: Cvent
  PublisherName: Cvent
