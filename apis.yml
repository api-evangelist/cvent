aid: cvent
name: Cvent
x-type: company
description: >-
  Cvent is a leading meetings, events, and hospitality technology
  provider with over 4,800 employees and 22,000+ customers worldwide.
  The Cvent platform spans Event Cloud (event management, registration,
  mobile event apps, virtual and hybrid events, Attendee Hub, surveys,
  Diagramming, and analytics) and Hospitality Cloud (Cvent Supplier
  Network, Passkey, Venue Sourcing, and Sales & Catering). Programmatic
  access is delivered through the unified Cvent Platform REST API
  (api-platform.cvent.com) using OAuth 2.0 client credentials, with
  legacy SOAP, BadgeKit, Jifflenow, and CSN APIs documented for
  historical integrations. The developer portal at developers.cvent.com
  hosts API references, guides, OpenAPI downloads, webhooks, SSO,
  custom widgets, white-label, and integration documentation.
