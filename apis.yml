apis:
  - aid: cvent:rest-api
    name: Cvent REST API
    description: >-
      The unified Cvent Platform REST API providing programmatic access
      to events, contacts, registrations, attendees, sessions, speakers,
      exhibitors, surveys, webhooks, and Attendee Hub resources. OAuth
      2.0 client credentials with the token endpoint at
      api-platform.cvent.com/ea/oauth2/token.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.cvent.com/docs/rest-api/overview
    baseURL: https://api-platform.cvent.com
    tags:
      - Attendees
      - Contacts
      - Events
      - OAuth 2.0
      - Registration
      - REST
      - Sessions
      - Surveys
      - Webhooks
    properties:
      - type: Documentation
        url: https://developers.cvent.com/docs/rest-api/overview
      - type: APIReference
        url: https://developers.cvent.com/docs/rest-api/reference/reference
      - type: GettingStarted
        url: https://developers.cvent.com/docs/rest-api/tutorials/developer-quickstart
      - type: Concepts
        url: https://developers.cvent.com/docs/rest-api/explanation/concepts
      - type: ChangeLog
        url: https://developers.cvent.com/docs/rest-api/changelog
      - type: MigrationGuide
        url: https://developers.cvent.com/docs/rest-api/migration-guide/benefits
  - aid: cvent:webhooks
    name: Cvent Webhooks API
    description: >-
      Cvent Webhooks notify external applications when actions occur in
      Cvent and send relevant data to a specified URL, automatically
      pushing event, attendee, speaker, and meeting request data to
      subscriber endpoints for real-time integration.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.cvent.com/docs/webhooks/overview
    tags:
      - Attendees
      - Events
      - Notifications
      - Sessions
      - Webhooks
    properties:
      - type: Documentation
        url: https://developers.cvent.com/docs/webhooks/overview
      - type: Guide
        url: https://developers.cvent.com/docs/webhooks/understanding-webhooks
      - type: GettingStarted
        url: https://developers.cvent.com/docs/webhooks/tutorials/account-setup
      - type: TechnicalRequirements
        url: https://developers.cvent.com/docs/webhooks/technical-requirements
  - aid: cvent:csn-api
    name: Cvent Supplier Network (CSN) API
    description: >-
      The Cvent Supplier Network (CSN) API provides integration with a
      database of 280,000+ hotels, suppliers, and destinations
      worldwide. Planners search and compare venues and manage RFPs;
      suppliers create and update proposals via a push-pull workflow.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.cvent.com/docs/legacy-api/csn/overview
    tags:
      - Hospitality
      - Proposals
      - RFP
      - Suppliers
      - Venues
    properties:
      - type: Documentation
        url: https://developers.cvent.com/docs/legacy-api/csn/overview
      - type: PlannerGuide
        url: https://developers.cvent.com/docs/legacy-api/csn/planner-guide/overview
      - type: SupplierGuide
        url: https://developers.cvent.com/docs/legacy-api/csn/supplier-guide/authentication
  - aid: cvent:passkey-reglink
    name: Cvent Passkey RegLink API
    description: >-
      Passkey RegLink APIs are RESTful JSON APIs (with legacy URL-based
      and SOAP options) connecting Cvent registration with Passkey
      hotel reservations. Send registrant info, fetch event and hotel
      availability, retrieve reservations, and create / update / cancel
      hotel bookings.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.cvent.com/docs/passkey/REST/overview
    tags:
      - Accommodations
      - Hotels
      - Registration
      - Reservations
    properties:
      - type: Documentation
        url: https://developers.cvent.com/docs/passkey/REST/overview
      - type: GettingStarted
        url: https://developers.cvent.com/docs/passkey/REST/getting-started
      - type: Callbacks
        url: https://developers.cvent.com/docs/passkey/REST/callbacks
      - type: FAQ
        url: https://developers.cvent.com/docs/passkey/REST/faq
  - aid: cvent:soap-api
    name: Cvent SOAP API (Legacy)
    description: >-
      The Cvent SOAP API is the original legacy API for pushing and
      pulling data between Cvent and internal systems. Supports contact
      and event management, custom fields, address book, and metadata.
      Being sunset in favor of the REST API.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.cvent.com/docs/legacy-api/soap-api/overview
    tags:
      - Contacts
      - Deprecated
      - Events
      - Legacy
      - Registration
      - SOAP
    properties:
      - type: Documentation
        url: https://developers.cvent.com/docs/legacy-api/soap-api/overview
      - type: APIReference
        url: https://developers.cvent.com/docs/legacy-api/soap-api/call-definitions/overview
      - type: ObjectDefinitions
        url: https://developers.cvent.com/docs/legacy-api/soap-api/object-definitions/overview
      - type: MigrationGuide
        url: https://developers.cvent.com/docs/rest-api/migration-guide/benefits
  - aid: cvent:custom-widgets
    name: Cvent Custom Widgets API
    description: >-
      The Cvent Custom Widgets API allows developers to build custom
      interactive widgets for Cvent Event Registration pages. SDK for
      widget elements, configuration files, and navigation methods.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.cvent.com/docs/custom-widgets/overview
    tags:
      - Customization
      - Embedding
      - Registration
      - Widgets
    properties:
      - type: Documentation
        url: https://developers.cvent.com/docs/custom-widgets/overview
      - type: GitHubRepository
        url: https://github.com/cvent/custom-widgets-labs
  - aid: cvent:sso
    name: Cvent Single Sign-On (SSO) Integration
    description: >-
      Cvent SSO enables identity provider integration via SAML and
      OpenID Connect for planner login, access portals, event
      registrant and Attendee Hub, Events+, and portal applications.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.cvent.com/docs/sso/overview
    tags:
      - Authentication
      - Identity
      - OpenID Connect
      - SAML
      - SSO
    properties:
      - type: Documentation
        url: https://developers.cvent.com/docs/sso/overview
      - type: Concepts
        url: https://developers.cvent.com/docs/sso/explanation/concepts
  - aid: cvent:white-label
    name: Cvent White Label API
    description: >-
      The Cvent White Label API enables venues and suppliers to embed
      Cvent RFP functionality into their own websites with custom
      branding, theming, and analytics for embedded RFP forms.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.cvent.com/docs/white-label/overview
    tags:
      - Branding
      - RFP
      - White Label
      - Widgets
    properties:
      - type: Documentation
        url: https://developers.cvent.com/docs/white-label/overview
  - aid: cvent:salesforce-app
    name: Cvent Salesforce App
    description: >-
      The Cvent Salesforce App integrates Cvent event data with
      Salesforce CRM, enabling users to view events from Salesforce,
      invite contacts and leads, and sync attendee data bidirectionally.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.cvent.com/docs/cvent-salesforce-app/overview
    tags:
