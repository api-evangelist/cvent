- slug: cvent-salesforce
  label: Sync Cvent attendees to Salesforce contacts
  partner: salesforce
  category: CRM
  use_case: When a Cvent attendee is added or updated for an event, upsert the matching Salesforce Contact (by email) with the latest registration, session, and engagement signal so reps see event activity in the timeline.
- slug: cvent-hubspot
  label: Push Cvent registrations to HubSpot contacts and deals
  partner: hubspot
  category: CRM
  use_case: When a Cvent registration is captured, upsert the corresponding HubSpot Contact and attach an event-attended Deal so sales pipeline reflects in-person and virtual touchpoints.
- slug: cvent-marketo
  label: Forward Cvent attendee activities into Marketo programs
  partner: marketo
  category: Marketing automation
  use_case: Stream Cvent attendee status changes (registered, attended, no-show) into Marketo as Program Member Status updates so nurture flows fire on real event behavior.
- slug: cvent-eloqua
  label: Sync Cvent contacts and registrations to Eloqua
  partner: eloqua
  category: Marketing automation
  use_case: Mirror Cvent contacts and event registration state into Oracle Eloqua contacts and shared lists so demand-gen campaigns can target event attendees directly.
- slug: cvent-mailchimp
  label: Add Cvent registrants to a Mailchimp audience
  partner: mailchimp
  category: Email marketing
  use_case: When a Cvent attendee registers, add or update them in a Mailchimp audience with tags for the event so post-event follow-up campaigns can target real registrants.
- slug: cvent-zoom
  label: Provision Zoom meetings for Cvent sessions
  partner: zoom
  category: Video
  use_case: For each new Cvent session marked virtual, auto-create the corresponding Zoom meeting and write the join URL back so attendees see the right link in their itinerary.
- slug: cvent-microsoft-teams
  label: Create Microsoft Teams events for Cvent webcasts
  partner: microsoft-teams
  category: Video
  use_case: When a Cvent webcast is created, provision the matching Microsoft Teams live event and link the Teams join URL on the webcast record.
- slug: cvent-slack
  label: Post Cvent attendee milestones to Slack
  partner: slack
  category: Collaboration
  use_case: When notable Cvent events happen (first 100 registrants, VIP registered, no-show flag) post a formatted message to the right Slack channel so the events team reacts in real time.
- slug: cvent-workday
  label: Push Cvent training event attendance to Workday Learning
  partner: workday
  category: HRIS
  use_case: For internal Cvent training events, send attendance records to Workday Learning as completion events so employee learning history stays accurate.
- slug: cvent-stripe
  label: Reconcile Cvent registration fees with Stripe payments
  partner: stripe
  category: Payments
  use_case: For each paid Cvent registration, look up the matching Stripe charge and write the Stripe charge id and net amount back onto the Cvent attendee record for finance reconciliation.
- slug: cvent-snowflake
  label: Land Cvent attendee and session activity in Snowflake
  partner: snowflake
  category: Data warehouse
  use_case: Stream Cvent attendees, sessions, and attendance-duration records into Snowflake so events analytics joins cleanly with the rest of the company's reporting models.
- slug: cvent-qualtrics
  label: Trigger Qualtrics post-event surveys from Cvent attendance
  partner: qualtrics
  category: Surveys
  use_case: When a Cvent attendee is marked as attended, enroll them in a Qualtrics XM distribution so post-event NPS / CSAT surveys go out automatically.
- slug: cvent-google-analytics
  label: Feed Cvent registration funnel events into GA4
  partner: google-analytics
  category: Analytics
  use_case: Forward Cvent registration funnel stage transitions (started, paid, registered, attended) into GA4 as custom events so marketing teams can attribute event-driven conversions.
