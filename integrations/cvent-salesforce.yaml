naftiko: 1.0.0-alpha2
info:
  label: Sync Cvent attendees to Salesforce contacts
  description: When a Cvent attendee is added or updated for an event, upsert the matching Salesforce Contact (by email) with the latest registration, session, and engagement signal so reps see event activity in the timeline.
  tags:
  - Cvent
  - Integration
  - CRM
  - salesforce
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    CVENT_API_KEY: CVENT_API_KEY
    SALESFORCE_API_KEY: SALESFORCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: cvent
    baseUri: https://api-platform.cvent.com
    description: Cvent API operations consumed by this integration.
    resources:
    - name: ea-attendees
      path: /ea/attendees
      operations:
      - name: listattendees
        method: GET
        description: List attendees across an event.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: ea-attendees-id
      path: /ea/attendees/{id}
      operations:
      - name: getattendee
        method: GET
        description: Get a single attendee record.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
  - type: http
    namespace: salesforce
    baseUri: https://yourinstance.my.salesforce.com
    description: Salesforce REST API operations consumed by this integration.
    resources:
    - name: services-data-v60-0-sobjects-contact
      path: /services/data/v60.0/sobjects/Contact
      operations:
      - name: createcontact
        method: POST
        description: 'Salesforce REST API: createContact'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: services-data-v60-0-sobjects-contact-id
      path: /services/data/v60.0/sobjects/Contact/{id}
      operations:
      - name: updatecontact
        method: PATCH
        description: 'Salesforce REST API: updateContact'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: cvent-salesforce-mcp
    description: MCP adapter for the cvent-salesforce integration.
    tools:
    - name: cvent_salesforce
      description: Execute the cvent salesforce integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: cvent-salesforce-rest
    port: 8080
    description: REST adapter for the cvent-salesforce integration.
    resources:
    - path: /cvent-salesforce
      name: cvent-salesforce
      description: REST surface for the cvent-salesforce integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the cvent-salesforce integration.
        call: cvent_salesforce
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
