naftiko: 1.0.0-alpha2
info:
  label: Forward Cvent attendee activities into Marketo programs
  description: Stream Cvent attendee status changes (registered, attended, no-show) into Marketo as Program Member Status updates so nurture flows fire on real event behavior.
  tags:
  - Cvent
  - Integration
  - Marketing automation
  - marketo
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    CVENT_API_KEY: CVENT_API_KEY
    MARKETO_API_KEY: MARKETO_API_KEY
capability:
  consumes:
  - type: http
    namespace: cvent
    baseUri: https://api-platform.cvent.com
    description: Cvent API operations consumed by this integration.
    resources:
    - name: ea-attendees
      path: /ea/attendees
      operations:
      - name: listattendees
        method: GET
        description: List Cvent attendees and current status.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: ea-attendees-id
      path: /ea/attendees/{id}
      operations:
      - name: getattendee
        method: GET
        description: Get individual attendee status.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
  - type: http
    namespace: marketo
    baseUri: https://yourinstance.mktorest.com
    description: Marketo REST API operations consumed by this integration.
    resources:
    - name: rest-v1-leads-json
      path: /rest/v1/leads.json
      operations:
      - name: upsertlead
        method: POST
        description: 'Marketo REST API: upsertLead'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-v1-leads-programs-programid-status-json
      path: /rest/v1/leads/programs/{programId}/status.json
      operations:
      - name: changeprogrammemberstatus
        method: POST
        description: 'Marketo REST API: changeProgramMemberStatus'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: programId
          in: path
          type: string
          description: Path parameter programId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: cvent-marketo-mcp
    description: MCP adapter for the cvent-marketo integration.
    tools:
    - name: cvent_marketo
      description: Execute the cvent marketo integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: cvent-marketo-rest
    port: 8080
    description: REST adapter for the cvent-marketo integration.
    resources:
    - path: /cvent-marketo
      name: cvent-marketo
      description: REST surface for the cvent-marketo integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the cvent-marketo integration.
        call: cvent_marketo
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
