naftiko: 1.0.0-alpha2
info:
  label: Cvent REST APIs — RFP Additional Details
  description: 'Cvent REST APIs — RFP Additional Details. 1 operations. Lead operation: List RFP Past Events. Self-contained Naftiko capability covering one business surface.'
  tags:
  - Cvent
  - RFP Additional Details
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    CVENT_API_KEY: CVENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-rfp-additional-details
    baseUri: https://api-platform.cvent.com/ea
    description: Cvent REST APIs — RFP Additional Details business capability. Self-contained, no shared references.
    resources:
    - name: rfps-rfpid-past-events
      path: /rfps/{rfpId}/past-events
      operations:
      - name: listrfppastevents
        method: GET
        description: List RFP Past Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: rfpId
          in: path
          type: string
          description: Path parameter rfpId.
          required: true
  exposes:
  - type: rest
    namespace: rest-rfp-additional-details-rest
    port: 8080
    description: REST adapter for Cvent REST APIs — RFP Additional Details. One resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/rfps/{rfpId}/past-events
      name: rfps-rfpid-past-events
      description: REST surface for rfps-rfpid-past-events.
      operations:
      - method: GET
        name: listrfppastevents
        description: List RFP Past Events
        call: rest-rfp-additional-details.listrfppastevents
        with:
          rfpId: rest.rfpId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-rfp-additional-details-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cvent REST APIs — RFP Additional Details. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: cvent-listrfppastevents
      description: List RFP Past Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-rfp-additional-details.listrfppastevents
      with:
        rfpId: tools.rfpId
      outputParameters:
      - type: object
        mapping: $.
