naftiko: 1.0.0-alpha2
info:
  label: Cvent REST APIs — File
  description: 'Cvent REST APIs — File. 2 operations. Lead operation: Get File Location. Self-contained Naftiko capability covering one business surface.'
  tags:
  - Cvent
  - File
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    CVENT_API_KEY: CVENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-file
    baseUri: https://api-platform.cvent.com/ea
    description: Cvent REST APIs — File business capability. Self-contained, no shared references.
    resources:
    - name: files
      path: /files
      operations:
      - name: uploadfile
        method: POST
        description: Upload a File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: files-id
      path: /files/{id}
      operations:
      - name: getfile
        method: GET
        description: Get File Location
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
  exposes:
  - type: rest
    namespace: rest-file-rest
    port: 8080
    description: REST adapter for Cvent REST APIs — File. One resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/files
      name: files
      description: REST surface for files.
      operations:
      - method: POST
        name: uploadfile
        description: Upload a File
        call: rest-file.uploadfile
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/files/{id}
      name: files-id
      description: REST surface for files-id.
      operations:
      - method: GET
        name: getfile
        description: Get File Location
        call: rest-file.getfile
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-file-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cvent REST APIs — File. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: cvent-uploadfile
      description: Upload a File
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-file.uploadfile
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cvent-getfile
      description: Get File Location
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-file.getfile
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
